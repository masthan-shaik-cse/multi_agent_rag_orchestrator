version: '3.8'

services:
  agentic_orchestrator:
    build: .
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - VECTOR_DB_HOST=chromadb
      - LOG_LEVEL=DEBUG
    networks:
      - enterprise_network

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    networks:
      - enterprise_network

networks:
  enterprise_network:
    driver: bridge
